# Configuración General y Persistencia
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Seguridad y Autenticación
allow_anonymous false
password_file /mosquitto/config/passwd

# Limpieza automática de sesiones huérfanas tras 30min de inactividad
# Los ciclos de reconexión del ESP32 ocurren en minutos, no horas.
# 30min da margen suficiente para reconexiones legítimas pero elimina
# fantasmas antes de que se acumulen y bloqueen nuevos handshakes.
persistent_client_expiration 30m

# Optimizar entrega de paquetes pequeños (PINGREQ/PINGRESP)
set_tcp_nodelay true

# Frente 1: Red Interna Docker (Backend Ingest/Scheduler)
listener 1883
protocol mqtt

# Frente 2: Hardware ESP32 (MQTTS - Seguro)
listener 8883
protocol mqtt
certfile /mosquitto/certs/live/mqtt.sisparrow.com/fullchain.pem
keyfile /mosquitto/certs/live/mqtt.sisparrow.com/privkey.pem
max_connections 5

# Frente 3: Frontend Vercel (WSS - WebSockets Seguros)
listener 8884
protocol websockets
certfile /mosquitto/certs/live/mqtt.sisparrow.com/fullchain.pem
keyfile /mosquitto/certs/live/mqtt.sisparrow.com/privkey.pem
max_connections 20