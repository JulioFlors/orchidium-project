# Configuración General y Persistencia
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Seguridad y Autenticación
allow_anonymous false
password_file /mosquitto/config/passwd

# Limpieza automática de sesiones huérfanas tras 30min de inactividad
# Los ciclos de reconexión del ESP32 ocurren en minutos, no horas.
# 30min da margen suficiente para reconexiones legítimas pero elimina
# fantasmas antes de que se acumulen y bloqueen nuevos handshakes.
persistent_client_expiration 30m

# Optimizar entrega de paquetes pequeños (PINGREQ/PINGRESP)
set_tcp_nodelay true

# Frente 1: Red Interna Docker (Backend Ingest/Scheduler)
listener 1883
protocol mqtt

# Frente 2: Hardware ESP32 (MQTTS - Seguro)
listener 8883
protocol mqtt
# Usamos cert.pem en lugar de fullchain.pem para el hardware ESP32.
# Esto reduce drásticamente el tamaño del paquete TLS enviado en el handshake.
# Dado que el firmware conecta con "cert_reqs": 0 (sin validación de CA),
# no necesita el certificado intermedio. Evita el error -17040 de mbedTLS.
certfile /mosquitto/certs/cert.pem
keyfile /mosquitto/certs/privkey.pem
# Forzar TLS 1.2: el mbedTLS del ESP32 (MicroPython) no soporta TLS 1.3.
# Sin esta línea, OpenSSL 3.x intenta negociar TLS 1.3 y el handshake falla
# con "tlsv1 alert decrypt error".
tls_version tlsv1.2
max_connections 5

# Frente 3: Frontend Vercel (WSS - WebSockets Seguros)
listener 8884
protocol websockets
# Los navegadores web sí requieren validación de la cadena completa de confianza (CA).
# Por lo tanto, aquí es obligatorio usar fullchain.pem para evitar errores en la web.
certfile /mosquitto/certs/fullchain.pem
keyfile /mosquitto/certs/privkey.pem
max_connections 20